version: 2
updates:
  - package-ecosystem: "npm"  
    cooldown:
      default-days: 7
    directory: "/"        
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    cooldown:
      default-days: 7
    directory: "/.github"  
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "ministryofjustice/hmpps-github-actions/*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    groups:
      github-actions-files:
        patterns:
          - "*"
  - package-ecosystem: "helm"
    directory: "/helm_deploy/hmpps-component-dependencies"  
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
